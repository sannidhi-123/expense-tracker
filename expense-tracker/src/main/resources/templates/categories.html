<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Categories | ExpenseTracker</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="app-container">

    <nav class="sidebar">
        <div class="brand"><i class="fas fa-wallet"></i> ExpenseTracker</div>
        <div class="nav-links">
            <a href="/dashboard" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
            <a href="/expenses" class="nav-item"><i class="fas fa-receipt"></i> Expenses</a>
            <a href="/categories" class="nav-item active"><i class="fas fa-tags"></i> Categories</a>
            <a href="/budget" class="nav-item"><i class="fas fa-bullseye"></i> Budget</a>
        </div>
        <form th:action="@{/logout}" method="post" class="logout-form">
            <button type="submit" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </form>
    </nav>

    <main class="main-content">
        <div class="card-box" style="max-width: 600px;">
            <h2>Manage Categories</h2>
            <p style="color:var(--text-muted); margin-bottom: 20px;">Add categories to organize your expenses better.</p>

            <form th:action="@{/categories/save}" th:object="${category}" method="post" style="flex-direction: row; gap: 10px;">
                <input type="text" th:field="*{name}" placeholder="New Category Name" required style="flex:1;">
                <button type="submit" style="width:auto;"><i class="fas fa-plus"></i> Add</button>
            </form>

            <h3 style="margin-top: 2rem; font-size: 0.9rem; text-transform: uppercase; color: var(--text-muted);">Existing Categories</h3>
            <ul style="list-style: none; padding: 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden;">
                <li th:each="c : ${categories}" style="padding: 12px 15px; border-bottom: 1px solid var(--border); background: white; display: flex; justify-content: space-between; align-items: center;">
                    <span th:text="${c.name}" style="font-weight: 500;"></span>
                    <i class="fas fa-tag" style="color: #cbd5e1;"></i>
                </li>
            </ul>
        </div>
    </main>
</div>
</body>
</html>
