<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Expenses | ExpenseTracker</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="app-container">

    <nav class="sidebar">
        <div class="brand"><i class="fas fa-wallet"></i> ExpenseTracker</div>
        <div class="nav-links">
            <a href="/dashboard" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
            <a href="/expenses" class="nav-item active"><i class="fas fa-receipt"></i> Expenses</a>
            <a href="/categories" class="nav-item"><i class="fas fa-tags"></i> Categories</a>
            <a href="/budget" class="nav-item"><i class="fas fa-bullseye"></i> Budget</a>
        </div>
        <form th:action="@{/logout}" method="post" class="logout-form">
            <button type="submit" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </form>
    </nav>

    <main class="main-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2rem;">
            <h2>Transaction History</h2>
            <a href="/expenses/add" style="background:var(--primary); color:white; padding:10px 20px; border-radius:8px; font-weight:600;">
                <i class="fas fa-plus"></i> Add New
            </a>
        </div>

        <div class="table-container">
            <table>
                <thead>
                <tr>
                    <th>Description</th>
                    <th>Category</th>
                    <th>Date</th>
                    <th>Type</th>
                    <th>Amount</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="e : ${expenses}">
                    <td th:text="${e.description}"></td>
                    <td>
                        <span th:if="${e.category}" th:text="${e.category.name}" style="background:#f1f5f9; padding:4px 8px; border-radius:4px; font-size:0.85rem; color:#64748b;"></span>
                        <span th:unless="${e.category}">-</span>
                    </td>
                    <td th:text="${e.date}"></td>
                    <td>
                        <span th:text="${e.type}"
                              th:style="${e.type == 'INCOME' ?
                              'background:#ecfdf5; color:#065f46; padding:4px 10px; border-radius:20px; font-size:0.8rem; font-weight:600;' :
                              'background:#fef2f2; color:#991b1b; padding:4px 10px; border-radius:20px; font-size:0.8rem; font-weight:600;'}">
                        </span>
                    </td>
                    <td th:text="${e.amount}" style="font-weight:bold;"></td>
                </tr>
                <tr th:if="${expenses.empty}">
                    <td colspan="5" style="text-align:center; padding:2rem; color:var(--text-muted);">No transactions found.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
</body>
</html>
