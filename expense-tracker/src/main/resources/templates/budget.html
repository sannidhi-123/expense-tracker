<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Budget | ExpenseTracker</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="app-container">

    <nav class="sidebar">
        <div class="brand"><i class="fas fa-wallet"></i> ExpenseTracker</div>
        <div class="nav-links">
            <a href="/dashboard" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
            <a href="/expenses" class="nav-item"><i class="fas fa-receipt"></i> Expenses</a>
            <a href="/categories" class="nav-item"><i class="fas fa-tags"></i> Categories</a>
            <a href="/budget" class="nav-item active"><i class="fas fa-bullseye"></i> Budget</a>
        </div>
        <form th:action="@{/logout}" method="post" class="logout-form">
            <button type="submit" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </form>
    </nav>

    <main class="main-content">
        <div class="card-box" style="max-width: 500px; margin: 0 auto; text-align: center; padding: 3rem 2rem;">

            <div style="background: #e0e7ff; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                <i class="fas fa-bullseye" style="font-size: 2.5rem; color: var(--primary);"></i>
            </div>

            <h2 style="font-size: 1.8rem;">Set Monthly Budget</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">
                Control your spending by setting a limit for this month.
            </p>

            <div th:if="${successMessage}" style="background:#ecfdf5; color:#065f46; padding:12px; border-radius:8px; margin-bottom:20px; font-weight:500; display:flex; align-items:center; justify-content:center; gap:8px;">
                <i class="fas fa-check-circle"></i> <span th:text="${successMessage}"></span>
            </div>

            <form th:action="@{/budget/save}" method="post">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px;">
                    <div style="text-align: left;">
                        <label>Month</label>
                        <select name="month" required>
                            <option th:each="m : ${#numbers.sequence(1,12)}" th:value="${m}" th:text="${m}" th:selected="${m == month}"></option>
                        </select>
                    </div>
                    <div style="text-align: left;">
                        <label>Year</label>
                        <input type="number" name="year" th:value="${year}" required>
                    </div>
                </div>

                <div style="text-align: left;">
                    <label>Budget Limit</label>
                    <input type="number" name="amount" th:value="${budget != null ? budget.limitAmount : ''}" placeholder="0.00" required style="font-size: 1.2rem; font-weight: bold;">
                </div>

                <button type="submit" style="margin-top: 10px;">Update Budget</button>
            </form>
        </div>
    </main>
</div>
</body>
</html>
