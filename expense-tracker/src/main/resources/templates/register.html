<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register | ExpenseTracker</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">
<div class="auth-card">
    <h2 style="margin-bottom: 2rem;">Create Account</h2>
    <form th:action="@{/register}" th:object="${user}" method="post">
        <input type="text" th:field="*{name}" placeholder="Full Name" required style="padding: 12px;">
        <input type="email" th:field="*{email}" placeholder="Email Address" required style="padding: 12px;">
        <input type="password" th:field="*{password}" placeholder="Choose Password" required style="padding: 12px;">
        <button type="submit" style="padding: 12px; margin-top: 10px;">Sign Up</button>
    </form>
    <p style="margin-top: 20px; font-size: 0.9rem; color: var(--text-muted);">
        Already have an account? <a href="/login" style="color: var(--primary); font-weight: 600;">Login</a>
    </p>
</div>
</body>
</html>
