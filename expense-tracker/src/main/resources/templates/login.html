<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login | ExpenseTracker</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">
<div class="auth-card">
    <div style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem;"><i class="fas fa-wallet"></i></div>
    <h2 style="margin-bottom: 2rem;">Welcome Back</h2>

    <div th:if="${param.error}" style="background:#fef2f2; color:#991b1b; padding:10px; border-radius:6px; margin-bottom:15px; font-size:0.9rem;">
        <i class="fas fa-exclamation-circle"></i> Invalid email or password
    </div>
    <div th:if="${param.logout}" style="background:#ecfdf5; color:#065f46; padding:10px; border-radius:6px; margin-bottom:15px; font-size:0.9rem;">
        <i class="fas fa-check-circle"></i> Logged out successfully
    </div>

    <form th:action="@{/login}" method="post">
        <input type="email" name="username" placeholder="Email Address" required style="padding: 12px;">
        <input type="password" name="password" placeholder="Password" required style="padding: 12px;">
        <button type="submit" style="padding: 12px; margin-top: 10px;">Login</button>
    </form>

    <p style="margin-top: 20px; font-size: 0.9rem; color: var(--text-muted);">
        Don't have an account? <a href="/register" style="color: var(--primary); font-weight: 600;">Sign up</a>
    </p>
</div>
</body>
</html>
